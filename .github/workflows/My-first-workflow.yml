name: My First Workflow

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  
  schedule:
    - cron: '0 5 * * 1-5'

  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v3

    - name: Use Node.js 
      uses: actions/setup-node@v3
      with:
        node-version: latest

    - name: Print a message
      run: echo "Hello, world!"

    - name: Install dependencies
      run: npm ci

    - name: Run tests
      run: npm test

    - name: Print a message
      run: echo "workflow running successful"